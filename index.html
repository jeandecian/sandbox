<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jean Decian</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 6rem 2rem;
        background-color: #fcfbfa;
        color: #1a1a1a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono:
          SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      }

      header {
        text-align: center;
        margin-bottom: 6rem;
      }

      header h1 {
        font-size: 5.5rem;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.06em;
        color: #111111;
      }

      header p {
        margin-top: 1.25rem;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="name">Jean Decian</h1>
      <p id="status">Ph.D. Student in Computer Science</p>
    </header>
  </body>
</html>
